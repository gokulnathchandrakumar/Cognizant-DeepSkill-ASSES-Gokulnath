# ============================================================
# Spring Framework and Application Log Levels
# ============================================================
# info = show INFO and above for Spring Framework logs
logging.level.org.springframework=info
# debug = show DEBUG and above for our own code
logging.level.com.cognizant=debug

# ============================================================
# Hibernate SQL Logging
# Shows the actual SQL queries Hibernate generates
# This is extremely useful for debugging
# ============================================================
logging.level.org.hibernate.SQL=trace
logging.level.org.hibernate.type.descriptor.sql=trace

# ============================================================
# Log Pattern
# %d{dd-MM-yy}     = date
# %d{HH:mm:ss.SSS} = time with milliseconds
# %-20.20thread     = thread name (max 20 chars)
# %5p               = log level (5 chars wide)
# %-25.25logger{25} = logger/class name (25 chars)
# %25M              = method name
# %4L               = line number
# %m%n              = message + newline
# ============================================================
logging.pattern.console=%d{dd-MM-yy} %d{HH:mm:ss.SSS} %-20.20thread %5p %-25.25logger{25} %25M %4L %m%n

# ============================================================
# Database Configuration — MySQL Connection
# ============================================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/ormlearn
spring.datasource.username=root
spring.datasource.password=root

# ============================================================
# Hibernate Configuration
# ============================================================
# ddl-auto options:
# create       = drop & recreate tables on every startup
# create-drop  = create on start, drop on shutdown
# update       = update existing schema (add columns etc)
# validate     = ONLY validates schema matches entities — NO changes made
# none         = do nothing
# Use 'validate' when tables already exist (as in this exercise)
spring.jpa.hibernate.ddl-auto=validate

# MySQL5Dialect = tells Hibernate to generate MySQL-compatible SQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL5Dialect

# Shows SQL in a formatted, readable way in logs
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
